<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>جولة افتراضية</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ملف CSS الرئيسي -->
    <link rel="stylesheet" href="style.css">

    <!-- Three.js -->
    <script src="https://unpkg.com/three@0.130.1/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.130.1/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <!-- الحاوية الرئيسية للمشهد -->
    <div id="container"></div>

    <!-- أزرار الوضعيات -->
    <button class="mode-btn" id="modeDraw">✏️ وضع الرسم</button>
    <button class="mode-btn" id="modeView">👁️ وضع العرض</button>

    <!-- أزرار التحكم بالرسم -->
    <button id="toggleDraw">✏️ تفعيل الرسم</button>
    <button id="toggleRotate">▶️ تشغيل التدوير</button>
    <button id="finalizePath">💾 حفظ المسار</button>
    <button id="clearAll">🧹 مسح جميع المسارات</button>

    <!-- أزرار إضافة نقاط Hotspots -->
    <button id="hotspotScene">🚪 إضافة نقطة انتقال</button>
    <button id="hotspotInfo">📝 إضافة نقطة معلومات</button>

    <!-- زر إضافة مشهد جديد -->
    <button id="addSceneBtn">➕ إضافة مشهد</button>

    <!-- زر تصدير الجولة -->
    <button id="exportTour">📤 تصدير الجولة</button>

    <!-- لوحة المشاهد -->
    <div id="sceneList"></div>

    <!-- مؤشر التحميل -->
    <div id="loader">⏳ جاري التحميل...</div>

    <!-- ملف JS الرئيسي -->
    <script src="main.js"></script>

</body>
</html>
