<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Actual View Studio - باني الجولات الإحترافي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">
    
    <!-- أيقونات Hotspots -->
    <link rel="icon" type="image/png" href="icon/hotspot.png">
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <!-- شريط الأدوات العلوي -->
    <div class="toolbar">
        <div class="logo">🏗️ Actual view Studio</div>
        <div class="controls">
            <button id="newProject">🆕 مشروع جديد</button>
            <button id="openProject">📂 فتح مشروع</button>
            <button id="saveProject">💾 حفظ المشروع</button>
            <button id="exportTour">📦 تصدير الجولة</button>
        </div>
    </div>

    <!-- حاوية شريط الوضعيات -->
    <div class="mode-bar-container">
        <div class="mode-bar">
            <button id="modeDraw" class="mode-btn active">🎨 الرسم</button>
            <button id="modeView" class="mode-btn">👁️ العرض</button>
        </div>
    </div>

    <!-- شريط الحالة -->
    <div class="status-bar" id="status">
        النوع الحالي: <span style="color:#ffcc00;">EL</span>
    </div>

    <!-- لوحة الألوان -->
    <div class="color-panel">
        <div class="color-btn EL" onclick="window.changeType('EL')"></div>
        <div class="color-btn AC" onclick="window.changeType('AC')"></div>
        <div class="color-btn WP" onclick="window.changeType('WP')"></div>
        <div class="color-btn WA" onclick="window.changeType('WA')"></div>
        <div class="color-btn GS" onclick="window.changeType('GS')"></div>
    </div>

    <!-- حاوية المشهد -->
    <div id="container"></div>

    <!-- أدوات الرسم -->
    <div class="drawing-tools">
        <button id="toggleRotate">⏸️ إيقاف التدوير</button>
        <button id="toggleDraw">✏️ تفعيل الرسم</button>
        <button id="finalizePath">💾 تثبيت المسار</button>
        <button id="clearAll">🗑️ مسح الكل</button>
    </div>

    <!-- شريط Hotspots -->
    <div class="hotspot-toolbar">
        <button class="hotspot-btn scene" id="hotspotScene" title="نقطة انتقال">
            <img src="icon/hotspot.png" alt="scene" style="width: 28px; height: 28px; filter: brightness(0) invert(1);">
        </button>
        <button class="hotspot-btn info" id="hotspotInfo" title="معلومات">
            <img src="icon/info.png" alt="info" style="width: 28px; height: 28px; filter: brightness(0) invert(1);">
        </button>
    </div>

    <!-- التلميحات -->
    <div class="hint">
        🖱 Click: إضافة نقطة<br>
        ⌫ Backspace: حذف آخر نقطة<br>
        ⏎ Enter: اعتماد المسار<br>
        🖼️ Esc: إلغاء الرسم<br>
        🔴 وضع Hotspot: اختر نوعاً ثم انقر
        <small>⌃ Ctrl + Click على نقطة: حذفها</small>
    </div>

    <!-- لوحة المشاريع -->
    <div class="project-panel" id="projectPanel" style="display: none;">
        <div class="panel-header">
            <h3>📁 المشاريع</h3>
            <button class="close-panel" onclick="toggleProjectPanel()">✕</button>
        </div>
        <div class="project-list" id="projectList"></div>
    </div>

    <!-- لوحة المشاهد -->
    <div class="scene-panel" id="scenePanel">
        <div class="panel-header">
            <h3>📋 المشاهد</h3>
            <button class="add-scene-btn" id="addSceneBtn">➕ إضافة مشهد</button>
        </div>
        <div class="scene-list" id="sceneList"></div>
    </div>

    <!-- شاشة التحميل -->
    <div id="loader" style="display: none;">⏳ جاري التحميل...</div>

    <!-- تحميل مسارات الأيقونات كمتغيرات CSS -->
    <script>
        document.documentElement.style.setProperty('--hotspot-icon', 'url("icon/hotspot.png")');
        document.documentElement.style.setProperty('--info-icon', 'url("icon/info.png")');
    </script>

    <script type="module" src="main.js"></script>
    
    <script>
        window.changeType = function(type) {
            if (window.setCurrentPathType) {
                window.setCurrentPathType(type);
            }
        };
        
        function toggleProjectPanel() {
            const panel = document.getElementById('projectPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
