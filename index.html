<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>جولة افتراضية متكاملة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ====== CSS كامل ====== -->
    <link rel="stylesheet" href="style.css">
    
    <!-- ====== Three.js & OrbitControls ====== -->
    <script src="https://unpkg.com/three@0.130.1/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.130.1/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <!-- الحاوية الرئيسية -->
    <div id="container"></div>

    <!-- لوحة تحميل -->
    <div id="loader">⏳ جاري التحميل...</div>

    <!-- لوحة المشاهد -->
    <div id="scenePanel">
        <div id="sceneList"></div>
    </div>

    <!-- أزرار التحكم -->
    <div style="position: fixed; top:10px; right:10px; z-index:5000; display:flex; gap:4px;">
        <button id="toggleRotate" class="control-btn">⏸️ إيقاف التدوير</button>
        <button id="toggleDraw" class="control-btn">✏️ تفعيل الرسم</button>
        <button id="finalizePath" class="control-btn">💾 حفظ المسار</button>
        <button id="clearAll" class="control-btn">🗑️ مسح جميع المسارات</button>
        <button id="hotspotScene" class="control-btn">🚪 إضافة نقطة انتقال</button>
        <button id="hotspotInfo" class="control-btn">📝 إضافة نقطة معلومات</button>
        <button id="addSceneBtn" class="control-btn">➕ إضافة مشهد</button>
        <button id="exportTour" class="control-btn">📤 تصدير الجولة</button>
    </div>

    <!-- أزرار الوضعيات -->
    <div style="position: fixed; top:10px; left:10px; z-index:5000; display:flex; gap:4px;">
        <button id="modeDraw" class="mode-btn active">وضع الرسم</button>
        <button id="modeView" class="mode-btn">وضع العرض</button>
    </div>

    <!-- JS الجولة الافتراضية -->
    <script src="script.js"></script>
</body>
</html>
